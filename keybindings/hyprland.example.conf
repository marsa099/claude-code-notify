# claude-code-notify keybindings for Hyprland
# Add these to your hyprland config (~/.config/hypr/hyprland.conf)
#
# Nix users: use the wrapper binaries shown below.
# Manual install: replace with "bash ~/.config/claude-notify/scripts/..."

# Allow permission
bind = CTRL SUPER, Y, exec, claude-notify-respond 1
# Always Allow
bind = CTRL SUPER, A, exec, claude-notify-respond 2
# Deny permission
bind = CTRL SUPER, N, exec, claude-notify-respond 3
# Next notification
bind = CTRL SUPER, P, exec, claude-notify-navigate
# Go to Claude instance
bind = CTRL SUPER, O, exec, claude-notify-goto
