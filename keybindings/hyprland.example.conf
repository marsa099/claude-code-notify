# claude-code-notify keybindings for Hyprland
# Add these to your hyprland config (~/.config/hypr/hyprland.conf)

# Allow permission
bind = CTRL SUPER, Y, exec, bash ~/.config/claude-notify/scripts/respond.sh 1
# Always Allow
bind = CTRL SUPER, A, exec, bash ~/.config/claude-notify/scripts/respond.sh 2
# Deny permission
bind = CTRL SUPER, N, exec, bash ~/.config/claude-notify/scripts/respond.sh 3
# Next notification
bind = CTRL SUPER, P, exec, bash ~/.config/claude-notify/scripts/navigate.sh
# Go to Claude instance
bind = CTRL SUPER, O, exec, bash ~/.config/claude-notify/scripts/goto.sh
