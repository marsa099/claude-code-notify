# claude-code-notify keybindings for sway/i3
# Add these to your sway config (~/.config/sway/config)

# Allow permission
bindsym Ctrl+Mod4+y exec bash ~/.config/claude-notify/scripts/respond.sh 1
# Always Allow
bindsym Ctrl+Mod4+a exec bash ~/.config/claude-notify/scripts/respond.sh 2
# Deny permission
bindsym Ctrl+Mod4+n exec bash ~/.config/claude-notify/scripts/respond.sh 3
# Next notification
bindsym Ctrl+Mod4+p exec bash ~/.config/claude-notify/scripts/navigate.sh
# Go to Claude instance
bindsym Ctrl+Mod4+o exec bash ~/.config/claude-notify/scripts/goto.sh
