# claude-code-notify keybindings for sway/i3
# Add these to your sway config (~/.config/sway/config)
#
# Nix users: use the wrapper binaries shown below.
# Manual install: replace with "bash ~/.config/claude-notify/scripts/..."

# Allow permission
bindsym Ctrl+Mod4+y exec claude-notify-respond 1
# Always Allow
bindsym Ctrl+Mod4+a exec claude-notify-respond 2
# Deny permission
bindsym Ctrl+Mod4+n exec claude-notify-respond 3
# Next notification
bindsym Ctrl+Mod4+p exec claude-notify-navigate
# Go to Claude instance
bindsym Ctrl+Mod4+o exec claude-notify-goto
